# Auralis Fan Control — Konfiguration
# MODE: off | observe | live   (Start "off"/"observe" = sicher, schreibt nichts)
MODE=observe
INTERVAL=5
DEADBAND=6

# Kritische Schwellen (Grad C) -> bei Ueberschreitung sofort 100%
GPU_CRIT=87
CPU_CRIT=88
DISK_CRIT=48
NVME_CRIT=78

# Kanaele:  CHAN<n>=<quelle>;<kurve>;<minimum>
#   quelle: cpu | gpu | nvme | disks | max   (max = max(cpu,gpu))
#   kurve:  "tempC:pwm tempC:pwm ..."  (pwm 0..255), linear interpoliert
#   minimum: kleinster PWM-Wert (Luefter nie ganz aus)
CHAN1=cpu;40:70 55:110 70:190 80:255;60
CHAN2=max;45:70 60:120 72:185 83:255;70
CHAN3=max;45:70 60:120 72:185 83:255;60
CHAN4=max;45:70 60:120 72:185 83:255;70
CHAN5=max;45:70 60:120 72:185 83:255;70
