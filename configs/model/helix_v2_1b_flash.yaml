# Helix v2 — 1B production model, FLASH variant (global_tokens: 0).
#
# Identical parameters/state_dict to helix_v2_1b.yaml — global_tokens has no
# weights, only an attention-mask pattern — so foundation checkpoints load 1:1.
# Why: sparse_attn_layer._use_flash() refuses flash-attn whenever
# global_tokens != 0 (stock flash-attn has no global-token support), so the
# original config silently ran all 6 attention layers as native O(L²) softmax.
# Dropping the 32 global tokens enables flash-attn (linear memory, much
# faster). At seq_len 2048 the only functional change: tokens >window apart
# lose access to the first 32 positions — continued pretraining adapts within
# a few hundred steps.
#
# window_size 1024 -> 2048 (corpus20b run): mask-only change, zero state-dict
# delta. At train ctx 2048 the window now covers the whole sequence, so the 6
# attention layers see full causal attention — exact long-range copy/recall
# range, which directly helps code (identifier reuse). Stays causal and
# flash-eligible: flash path keeps window_size=(2047, 0), global_tokens stays
# 0 so flash-attn is never disabled.
#
# Heterogeneous 28-layer stack: 6 Mamba-2 + 16 GLA + 6 Sparse Attention.

name: helix_v2_1b_flash
version: "2.0.0"

tokenizer:
  path: "tokenizer/helix_v2_tokenizer.model"
  vocab_size: 200000

model:
  d_model: 1280
  n_layers: 28
  n_heads: 10         # 10 * 128 = 1280 ✓
  d_head: 128
  d_ffn: 3584         # ~2.8x d_model
  activation: silu
  norm_type: rmsnorm
  norm_eps: 1.0e-6

layers:
  - {repeat: 6,  config: {type: mamba,           d_state: 128, d_conv: 4, expand_factor: 2, dt_min: 0.001, dt_max: 0.1}}
  - {repeat: 16, config: {type: gla,             d_state: 128}}
  - {repeat: 6,  config: {type: sparse_attention, window_size: 2048, global_tokens: 0, use_rope: true}}

ffn:
  type: dense
  activation: silu_gated

moe:
  enabled: false

mtp:
  enabled: false
  n_heads: 1

position_encoding:
  type: rope
  theta: 10000.0
  max_seq_length: 8192

init:
  scheme: scaled_normal
  init_std: 0.02
  embedding_init_std: 0.02
  output_init_scale: 0.5

dropout:
  embedding: 0.0
  attention: 0.0
  ffn: 0.0
  residual: 0.0

advanced:
  tie_embeddings: true
  use_flash_attention: true
  gradient_checkpointing: false
