# Helix v2 — 250M intermediate model (actually ~261M with tied embeddings).
#
# Target use cases:
#   - Running real training on a consumer / workstation GPU (RTX 3090 24GB,
#     RTX Pro 5000 Blackwell 48GB, A6000 48GB) before committing to cloud.
#   - Validating the full phase-1 pipeline end-to-end on a bigger-than-
#     100M model without needing 1B-scale VRAM.
#
# 12 layers: 3 Mamba + 6 GLA + 3 Sparse Attention.
# At bf16 training: ~0.5 GB weights + ~2 GB optimizer state (AdamW) +
# activations; fits comfortably in 24 GB even at seq_length 4096.

name: helix_v2_250m
version: "2.0.0"

tokenizer:
  path: "tokenizer/helix_v2_tokenizer.model"
  vocab_size: 200000

model:
  d_model: 768
  n_layers: 12
  n_heads: 12            # 12 * 64 = 768 ✓
  d_head: 64
  d_ffn: 2048            # ~2.67x d_model
  activation: silu
  norm_type: rmsnorm
  norm_eps: 1.0e-6

# Stack: 3 Mamba (local) + 6 GLA (bulk) + 3 Sparse Attention (long-range).
# Proportions scale down the 6/16/6 pattern of the 1B model.
layers:
  - {repeat: 3, config: {type: mamba,           d_state: 96, d_conv: 4, expand_factor: 2, dt_min: 0.001, dt_max: 0.1}}
  - {repeat: 6, config: {type: gla,             d_state: 96}}
  - {repeat: 3, config: {type: sparse_attention, window_size: 512, global_tokens: 24, use_rope: true}}

ffn:
  type: dense
  activation: silu_gated

moe:
  enabled: false

mtp:
  enabled: false
  n_heads: 1

position_encoding:
  type: rope
  theta: 10000.0
  max_seq_length: 4096

init:
  scheme: scaled_normal
  init_std: 0.02
  embedding_init_std: 0.02
  output_init_scale: 0.5

dropout:
  embedding: 0.0
  attention: 0.0
  ffn: 0.0
  residual: 0.0

advanced:
  tie_embeddings: true
  use_flash_attention: true
  gradient_checkpointing: false
