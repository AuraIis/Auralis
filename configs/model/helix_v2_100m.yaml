# Helix v2 — 100M test model.
#
# 8-layer compact variant for CPU-side unit tests and architecture
# validation. Not for pretraining. Parameter count lands ~134M with tied
# embeddings (the 200k vocab dominates).

name: helix_v2_100m
version: "2.0.0"

tokenizer:
  path: "tokenizer/helix_v2_tokenizer.model"
  vocab_size: 200000

model:
  d_model: 512
  n_layers: 8
  n_heads: 8
  d_head: 64          # 8 * 64 = 512 ✓
  d_ffn: 1344         # ~2.625x d_model
  activation: silu
  norm_type: rmsnorm
  norm_eps: 1.0e-6

# Layer stack (8 layers): 2 Mamba + 4 GLA + 2 Sparse Attention.
layers:
  - {repeat: 2, config: {type: mamba,           d_state: 64,  d_conv: 4, expand_factor: 2, dt_min: 0.001, dt_max: 0.1}}
  - {repeat: 4, config: {type: gla,             d_state: 64}}
  - {repeat: 2, config: {type: sparse_attention, window_size: 256, global_tokens: 16, use_rope: true}}

ffn:
  type: dense
  activation: silu_gated

moe:
  enabled: false

mtp:
  enabled: false
  n_heads: 1

position_encoding:
  type: rope
  theta: 10000.0
  max_seq_length: 2048

init:
  scheme: scaled_normal
  init_std: 0.02
  embedding_init_std: 0.02
  output_init_scale: 0.5

dropout:
  embedding: 0.0
  attention: 0.0
  ffn: 0.0
  residual: 0.0

advanced:
  tie_embeddings: true
  use_flash_attention: false   # CPU-only reference build
  gradient_checkpointing: false
