# Helix v2 - 500M clean-v2 fast canary.
#
# Same core 500M hybrid stack as helix_v2_mid_500m.yaml, but sparse-attention
# global tokens are disabled so the sparse layers can use the flash-attention
# window path when the kernel is available. This is the preferred first fresh
# base run before spending a full 1B run on the clean-v2 corpus.

name: helix_v2_mid_500m_fast
version: "2.0.0"

tokenizer:
  path: "tokenizer/helix_v2_tokenizer.model"
  vocab_size: 200000

model:
  d_model: 1024
  n_layers: 20
  n_heads: 16
  d_head: 64
  d_ffn: 2816
  activation: silu
  norm_type: rmsnorm
  norm_eps: 1.0e-6

layers:
  - {repeat: 4,  config: {type: mamba,            d_state: 64, d_conv: 4, expand_factor: 2, dt_min: 0.001, dt_max: 0.1}}
  - {repeat: 12, config: {type: gla,              d_state: 64}}
  - {repeat: 4,  config: {type: sparse_attention, window_size: 1024, global_tokens: 0, use_rope: true}}

ffn:
  type: dense
  activation: silu_gated

moe: {enabled: false}
mtp: {enabled: false, n_heads: 1}

position_encoding:
  type: rope
  theta: 10000.0
  max_seq_length: 2048

init:
  scheme: scaled_normal
  init_std: 0.02
  embedding_init_std: 0.02
  output_init_scale: 0.5

dropout: {embedding: 0.0, attention: 0.0, ffn: 0.0, residual: 0.0}

advanced:
  tie_embeddings: true
  use_flash_attention: true
  gradient_checkpointing: true
