# data_paths.yaml — zentrale Pfad-Konfiguration.
#
# Alle Daten-Scripts lesen diese Datei. Keine Pfade im Code hardcoden.
# Pfade sind Windows-/UNC-freundlich; Forward-Slashes funktionieren auch in
# Python unter Windows (pathlib normalisiert).

# Root für Downloads / tokenisierte Daten. Das NAS-Share hat 25+ TB frei,
# lokal (I:) bleibt das Repo schlank.
data_root: "//BITBASTION/Auralis/AuralisV2"

# Pfade unter data_root. relative = data_root + subpath.
raw:
  english: "raw/english"
  german:  "raw/german"
  code:    "raw/code"
  sft:     "raw/sft"
  orpo:    "raw/orpo"

# A list of (path or glob) per language, relative to data_root.
# Globs are expanded at runtime by prepare_corpus.py / report_quality.py.
# Keep `german.txt` as a single pre-concatenated file because it was built
# by reuse_v1_de_pretrain.py with full content-hash dedup already.
cleaned:
  english:
    - "raw/english/fineweb_edu.txt"     # 40 GB, ~10B tokens
    - "raw/english/wikipedia_en.txt"    # 12 GB,  ~3B tokens
    - "raw/english/openmath.txt"        #  8 GB,  ~2B tokens
    # Dolma (3B target) skipped — script-based loader, unsupported by
    # datasets v4+. Gap (~3B EN tokens) left for phase-2 top-up.
  german:
    - "cleaned/german.txt"              # 23.7 GB, ~4.7B tokens (v1-reused)
  code:
    - "raw/code/starcoderdata.txt"      # 3.5 GB, ~1B tokens
    - "raw/code/open_web_math.txt"      # 0.9 GB, ~250M tokens

tokenized:
  phase1_english: "tokenized/phase1/english.bin"
  phase1_german:  "tokenized/phase1/german.bin"
  phase1_code:    "tokenized/phase1/code.bin"
  phase2_english: "tokenized/phase2/english.bin"
  phase2_german:  "tokenized/phase2/german.bin"
  phase2_code:    "tokenized/phase2/code.bin"

# v1-Daten zur Wiederverwendung (DE-SFT). Lokaler Pfad auf I:.
v1_data_root: "I:/Auralis/NEWGPT/data"

# Target-Tokens pro Quelle (Phase 1, 25B Total, EN/DE/Code = 75/20/5).
# Quellen siehe Doc/SPEC_DATASETS.md.
phase1_targets:
  english:
    fineweb_edu:   10_000_000_000
    wikipedia_en:   3_000_000_000
    dolma:          3_000_000_000    # replaced SlimPajama-627B (removed from HF)
    openmath:       2_000_000_000
  german:
    german_commons: 3_000_000_000
    wikipedia_de:   1_000_000_000
    oscar_de:       1_000_000_000
  code:
    starcoder:      1_000_000_000
    the_stack_v2:     900_000_000    # preferred; bigger, license-clean. Pod download only.
    open_web_math:    250_000_000    # replaced Proof-Pile-2 (script-based, unsupported)

# Filter-Defaults (override per Quelle falls nötig).
filters:
  english:
    min_length: 200
    max_length: 100_000
    fineweb_min_score: 2.5
  german:
    min_length: 300
    max_length: 100_000
    max_perplexity: 500
    cultural_keep_ratio: 0.05     # aus v1 gelernt: nur 5% historisch
    excluded_subsets:
      - gutenberg_pre_1900
      - dta_historical
  code:
    min_length: 50
    max_length: 30_000
    min_stars: 5
