experiment:
  name: helix_v2_500m_pretrain_v6_books_augmented_from_v5_best_bitbastion
  version: "0.1"
  description: "Short BITBASTION smoke on Gutenberg/Open-Books plus v6 expanded German mix, initialized from v5 A100 best.pt."

model:
  config_path: "configs/model/helix_v2_mid_500m_smart.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/pretrain_v6_books_augmented_test"
  mix_ratios:
    english: 0.65
    german: 0.35
  seq_length: 2048
  val_split_bytes: 4_000_000
  dataloader_seed: 20260527

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true

  optimizer:
    name: adamw
    lr: 1.0e-5
    betas: [0.9, 0.95]
    weight_decay: 0.05
    eps: 1.0e-8
    fused: true

  scheduler:
    type: cosine
    warmup_steps: 10
    min_lr_ratio: 0.25

  batch_size_per_device: 1
  gradient_accumulation: 32
  gradient_clip_norm: 1.0

  total_steps: 100

  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 5
  eval_every: 50
  save_every: 100
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["v6-books", "pretrain", "500m", "bitbastion"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/pretrain_v6_books_augmented_500m_from_v5_best_bitbastion"
  save_last_n: 2
  save_best: true
  external_backup:
    enabled: false
    path: ""
    interval_steps: 500

evaluation:
  max_val_batches: 40
  per_language_batches: 20

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 3
