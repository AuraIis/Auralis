experiment:
  name: helix_v2_1b_canary_readiness
  version: "0.1"
  description: >
    Guarded 1B canary template. Do not run until
    scripts/eval/one_b_readiness_preflight.py reports ready_to_launch=true.

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/curated_40b"
  mix_ratios:
    german: 0.45
    english: 0.55
  seq_length: 2048
  val_split_bytes: 8_000_000
  dataloader_seed: 20260529

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true

  optimizer:
    name: adamw
    lr: 8.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.05
    eps: 1.0e-8
    fused: true

  scheduler:
    type: cosine
    warmup_steps: 20
    min_lr_ratio: 0.3

  batch_size_per_device: 1
  gradient_accumulation: 32
  gradient_clip_norm: 1.0
  total_steps: 1000

  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 5
  eval_every: 100
  save_every: 100
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["1b", "canary", "readiness-gated"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/pretrain_1b_canary_readiness"
  save_last_n: 3
  save_best: true
  external_backup:
    enabled: false
    path: ""
    interval_steps: 500

evaluation:
  max_val_batches: 50
  per_language_batches: 20
  tokens_per_byte:
    english: 0.1990
    german: 0.2338

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 2
