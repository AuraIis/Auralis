experiment:
  name: helix_v2_1b_code_math_anneal_v3
  version: "0.3"
  description: >
    Iter-2 anneal (Track B). v1(code50/de20)->de+12%, v2(code35/de45 on the SAME tiny
    2.4M DE set)->de+97% (overfitting a narrow set HURT held-out DE). Fix is BREADTH:
    de.bin is now 23.5M broad tokens sampled doc-level from the FOUNDATION distribution
    (FineWeb2-DE-edu + wiki = same as held-out DE), plus 7.5M EN retention. At 40% DE /
    1500 steps the DE set is seen <1x (no repetition -> no overfit). Mix 30/20/40/10.
    Warm-start FOUNDATION step_50000. Gate (fixed held-out): code<1000 (target<500),
    de<=+5% (<=~310), en<=238, math not worse. eval @ 250/500/.../1500.

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/code_anneal_v2"
  mix_ratios:
    code: 0.30
    math: 0.20
    de: 0.40
    en: 0.10
  seq_length: 2048
  val_split_bytes: 2_000_000
  dataloader_seed: 20260608

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true
  optimizer:
    name: adamw
    lr: 2.0e-5
    betas: [0.9, 0.95]
    weight_decay: 0.05
    eps: 1.0e-8
    fused: true
  scheduler:
    type: cosine
    warmup_steps: 50
    min_lr_ratio: 0.0
  batch_size_per_device: 1
  gradient_accumulation: 16
  gradient_clip_norm: 1.0
  total_steps: 1500
  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 10
  eval_every: 250
  save_every: 500
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["1b", "anneal", "code", "v3", "broad-de"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/code_math_anneal_v3"
  save_last_n: 5
  save_best: true
  skip_step_save_if_checkpoint_written: true
  external_backup:
    enabled: false
    path: ""
    interval_steps: 1000

evaluation:
  max_val_batches: 30
  per_language_batches: 12
  tokens_per_byte:
    code: 0.28
    math: 0.22
    de: 0.18
    en: 0.21

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 8
    val_min_delta: 0.01
    bpb_regression_enabled: false
    bpb_regression_languages: []
    bpb_regression_max_increase: 0.25
    bpb_regression_k: 2
    bpb_regression_lookback: 4
    bpb_regression_warmup_evals: 3
