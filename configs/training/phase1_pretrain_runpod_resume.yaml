# Phase 1 pretraining — RunPod resume from step 25000.
#
# Forked from phase1_pretrain.yaml on 2026-05-04 to resume the run that
# auto-stopped at step 27000 with val_regression_stop_k=3 (relaxed to 5
# below). All per-domain val losses were still improving at step 26000;
# the aggregate jitter +0.0008 over 3 evals tripped the over-eager stop.
#
# Resume target: 50k more steps (total 80k from original target).
# Speed knobs ON (we now know the model architecture is stable so the
# restart-cost concern from the original config no longer applies).

experiment:
  name: helix_v2_phase1_pretrain_runpod_resume
  version: "1.1"
  description: "Resume from step 25000, RunPod H100/H200, relaxed val-stop, fused AdamW + TF32."

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  # RunPod-side: tokenized data lives on the network volume mounted at /workspace/network_volume
  data_dir: "/workspace/network_volume/tokenized/curated_40b"
  mix_ratios:
    english: 0.70
    german:  0.25
    code:    0.05
  seq_length: 2048
  val_split_bytes: 50_000_000
  dataloader_seed: 42

training:
  device: "cuda"
  dtype: "bfloat16"

  # Speed knobs ON (vs OFF in original phase1_pretrain.yaml — we no longer
  # need to preserve mid-flight compatibility).
  matmul_precision: "high"        # ~1-3% TF32 boost on the fp32 ops

  optimizer:
    name: adamw
    lr: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-8
    fused: true                   # ~3-5% via fused AdamW CUDA kernel

  scheduler:
    type: cosine
    warmup_steps: 2000            # warmup already done; resume is past it
    min_lr_ratio: 0.1

  # H100/H200 has more VRAM than the Blackwell — could go batch=8 here for
  # ~2× throughput at the cost of some gradient-noise change. Conservative
  # default keeps batch=4 to match the resume-from checkpoint's optimizer
  # state (it was trained with batch=4); flip after first 1k steps if
  # tok/s look low.
  batch_size_per_device: 4
  gradient_accumulation: 32
  gradient_clip_norm: 1.0

  total_steps: 80_000
  gradient_checkpointing: true
  torch_compile: true

logging:
  log_every: 10
  eval_every: 1000
  save_every: 2500
  wandb:
    enabled: false               # turn on if you have W&B set up on the pod
    project: "auralis-v2"
    tags: ["phase1", "pretrain", "helix-v2", "runpod-resume"]

checkpointing:
  output_dir: "/workspace/network_volume/checkpoints/phase1_pretrain"
  save_last_n: 3
  save_best: true
  external_backup:
    enabled: false               # network volume IS the persistent storage
    path: ""
    interval_steps: 10000

evaluation:
  max_val_batches: 100
  benchmarks:
    - {name: baseline_50, path: "eval/baseline_questions.yaml", frequency: 5000}

monitoring:
  health:
    grad_explosion_threshold: 100.0
    # Relaxed from 3 -> 5. Per-domain analysis showed all 3 langs were
    # still improving at step 26k when the aggregate fired the stop;
    # 5-in-a-row gives the optimizer more breathing room to escape
    # local plateaus near the loss floor.
    val_regression_stop_k: 5

smoke_test:
  model_config: "configs/model/helix_v2_100m.yaml"
  batch_size: 2
  gradient_accumulation: 1
  seq_length: 64
  total_steps: 20
  log_every: 5
