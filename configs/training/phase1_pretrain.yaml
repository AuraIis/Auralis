# Phase 1 pretraining configuration.
#
# This is THE authoritative config for the English-heavy pretraining run.
# Changing a value here *is* the experiment change — do not override on the
# command line ad-hoc; fork the file and record both in MANIFEST.yaml.

experiment:
  name: helix_v2_phase1_pretrain
  version: "1.0"
  description: "EN-heavy pretraining, ~21B tokens (target 25B, 84% coverage)."

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  # Container-Pfad. Host-side bind-mount (2026-04-26) routed dies auf
  # /mnt/cache/auralis_tokens_local/curated_40b → NVMe (siehe HISTORY).
  data_dir: "/workspace/v2data/tokenized/curated_40b"
  # Sieger-Mix aus 4-Wege-Canary-Ablation 2026-04-26 (Baseline-Mix lag overall
  # vorn, aber DE-Lücke 6.5 → 6.28 begründet den 25%-DE-Anteil hier).
  mix_ratios:
    english: 0.70
    german:  0.25
    code:    0.05
  seq_length: 2048
  val_split_bytes: 50_000_000   # hold-out at the tail of each bin for val
  dataloader_seed: 42

training:
  device: "cuda"                  # overridden by --device on CPU smoke tests
  dtype: "bfloat16"

  optimizer:
    name: adamw
    lr: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-8

  scheduler:
    type: cosine
    warmup_steps: 2000
    min_lr_ratio: 0.1

  # Microbatch-Größe aus 1B-Sweep (2026-04-26): seq=2048 batch=4 ist Sweet Spot
  # (~11.3k tok/s, 23.3 GB peak). batch=8 holt nur +6% tok/s bei +84% VRAM.
  # Effective batch bleibt 128 = 4 × 32.
  batch_size_per_device: 4
  gradient_accumulation: 32
  gradient_clip_norm: 1.0

  # 80k steps * 4 * 32 * 2048 ≈ 21 B tokens (our actual coverage).
  total_steps: 80_000

  gradient_checkpointing: true
  torch_compile: true

logging:
  log_every: 10
  eval_every: 1000
  save_every: 2500
  wandb:
    enabled: true
    project: "auralis-v2"
    tags: ["phase1", "pretrain", "helix-v2"]

checkpointing:
  # Primary: relativ zum Working-Dir /workspace/v2data → SHFS routed auf disk6
  # (Auralis-share, HDD array). Bewusst auf HDD statt NVMe-cache: cache wird
  # für die Token-Bins (input data, gebunden via 2026-04-26-bind) reserviert.
  # ~10.8 GB pro Ckpt × (save_last_n=3 + save_best=1) = 43 GB. Write-overhead
  # ~50-90s pro Save (HDD vs ~23s auf NVMe) bei save_every=2500 vernachlässigbar.
  output_dir: "checkpoints/phase1_pretrain"
  save_last_n: 3
  save_best: true
  # Backup: separater Container-mount /checkpoints → /mnt/user/Auralis/checkpoints,
  # physisch ebenfalls disk6. Funktional verifiziert 2026-04-26 per write-test.
  # Alle 10k Steps = 8 Backups über den 80k-Run.
  external_backup:
    enabled: true
    path: "/checkpoints/phase1_pretrain_backup"
    interval_steps: 10000

evaluation:
  max_val_batches: 100
  # NOTE: the trainer currently only honours `max_val_batches` (and
  # `per_language_batches` if present). The `benchmarks:` block below is a
  # forward-looking config — Codex 2nd-pass P6 — for an automated benchmark
  # runner to be wired up in a follow-up PR. Until that runner exists, the
  # `baseline_50` questions are run manually via scripts/eval/run_benchmark.py.
  # Leaving the schema declared so the eventual implementation has a
  # documented target; keep frequency a multiple of save_every (2500).
  benchmarks:
    - {name: baseline_50,     path: "eval/baseline_questions.yaml", frequency: 5000}

monitoring:
  # Schema = HealthConfig dataclass in src/auralis/training/health.py.
  # Trainer liest monitoring.health.<feld>; alle nicht gesetzten Felder behalten
  # die Defaults aus HealthConfig. NaN-in-loss wird hardcoded vom Trainer
  # gefangen (siehe test_trainer_raises_on_nan_loss), kein Config-Feld nötig.
  health:
    grad_explosion_threshold: 100.0   # Default 50 — wir tolerieren bis 100
    val_regression_stop_k: 3          # Default 5 — wir stoppen früher

# Knobs used only by the CPU smoke test (see scripts/pretrain/smoke_test.py).
# Picked so one full cycle runs in < 2 minutes on the repo's default Python.
smoke_test:
  model_config: "configs/model/helix_v2_100m.yaml"
  batch_size: 2
  gradient_accumulation: 1
  seq_length: 64
  total_steps: 20
  log_every: 5
