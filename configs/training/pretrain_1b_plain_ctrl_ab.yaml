experiment:
  name: helix_v2_1b_plain_ctrl_ab
  version: "0.1"
  description: >
    Architecture A/B control: identical to the de55/en45 ramp in EVERY training
    knob (data, mix, LR, schedule, batch, steps, guards) — the ONLY difference is
    model.config_path points at the all-plain-attention control. Run fresh (no
    warm-start) and overlay its loss/bpb curve against the Helix ramp at the same
    steps to see whether the hybrid stack is the bottleneck.

model:
  config_path: "configs/model/helix_v2_1b_plain_ctrl.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/curated_40b"
  mix_ratios:
    german: 0.55
    english: 0.45
  seq_length: 2048
  val_split_bytes: 8_000_000
  dataloader_seed: 20260530

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: false           # irrelevant for plain attention
    gla: false
    flash_attention: true
  optimizer:
    name: adamw
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.05
    eps: 1.0e-8
    fused: true
  scheduler:
    type: cosine
    warmup_steps: 500
    min_lr_ratio: 0.15
  batch_size_per_device: 1
  gradient_accumulation: 32
  gradient_clip_norm: 1.0
  total_steps: 5000
  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 5
  eval_every: 100
  save_every: 500
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["1b", "ablation", "plain-attn", "ab-control"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/pretrain_1b_plain_ctrl_ab"
  save_last_n: 4
  save_best: true
  external_backup:
    enabled: false
    path: ""
    interval_steps: 1000

evaluation:
  max_val_batches: 50
  per_language_batches: 20
  tokens_per_byte:
    english: 0.1990
    german: 0.2338

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 3
    bpb_regression_enabled: true
    bpb_regression_languages: ["english", "german"]
    bpb_regression_max_increase: 0.25
    bpb_regression_k: 2
    bpb_regression_warmup_evals: 3

ab_notes:
  compare_against: "checkpoints/pretrain_1b_bilingual_de55_en45_ramp (Helix hybrid, same config)"
  read: >
    Overlay train/loss and eval/bpb_* at matching steps. Plain >> Helix means the
    hybrid (or its kernels/init) is the bottleneck; roughly equal means it is not.
