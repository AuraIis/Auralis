experiment:
  name: helix_v2_1b_balanced_lr2e4_smoke
  version: "0.1"
  description: >
    Matched A/B smoke against the German-stem S1 smoke. Same optimizer,
    schedule, batch, eval cadence, and data directory, but with a balanced
    bilingual mix. Use this to decide whether German-first helps enough to
    justify the loss of simultaneous cross-lingual transfer.

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/curated_40b"
  mix_ratios:
    english: 0.55
    german: 0.45
  seq_length: 2048
  val_split_bytes: 8_000_000
  dataloader_seed: 20260530

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true

  optimizer:
    name: adamw
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.05
    eps: 1.0e-8
    fused: true

  scheduler:
    type: cosine
    warmup_steps: 200
    min_lr_ratio: 0.15

  batch_size_per_device: 1
  gradient_accumulation: 32
  gradient_clip_norm: 1.0
  total_steps: 2000

  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 5
  eval_every: 100
  save_every: 250
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["1b", "language-tree", "balanced", "lr2e-4", "smoke"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/pretrain_1b_balanced_lr2e4_smoke"
  save_last_n: 4
  save_best: true
  external_backup:
    enabled: false
    path: ""
    interval_steps: 500

evaluation:
  max_val_batches: 50
  per_language_batches: 20
  tokens_per_byte:
    english: 0.1990
    german: 0.2338

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 3

comparison_notes:
  compare_against: pretrain_1b_s1_german_stem_smoke
  compare_at_steps:
    - 100
    - 250
    - 500
  primary_decision_metrics:
    - bpb_german
    - bpb_english
    - bpb_gap_max
    - generation_degeneracy
    - grad_norm_stability
