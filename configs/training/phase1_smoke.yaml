# Phase 1 SMOKE TEST — production-equivalent training settings, 50 steps only.
#
# Purpose: Validate the full Hauptlauf-Konfig (model=1B, seq=2048, batch=4 ×
# accum=32, gc=on, torch_compile=on, mix 70/25/5) end-to-end on Blackwell GPU
# BEFORE committing to the 80k-step run. We watch for: tok/s vs sweep
# baseline (~11.3k), data_wait%, peak VRAM, gradient norm stability,
# loss-finite, no compile errors.
#
# Differences from phase1_pretrain.yaml:
#   - total_steps: 50 (vs 80_000)
#   - eval_every / save_every / wandb / external_backup disabled
#   - separate output_dir to avoid touching production checkpoints
#
# All other settings (model, optimizer, scheduler, mix, batch, gc, compile,
# health thresholds) are IDENTICAL to phase1_pretrain.yaml so the smoke
# numbers translate 1:1 to the main run.

experiment:
  name: helix_v2_phase1_smoke
  version: "1.0"
  description: "50-step smoke under production Hauptlauf-Settings (1B, seq=2048, batch=4, mix 70/25/5)."

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/curated_40b"
  mix_ratios:
    english: 0.70
    german:  0.25
    code:    0.05
  seq_length: 2048
  val_split_bytes: 50_000_000
  dataloader_seed: 42

training:
  device: "cuda"
  dtype: "bfloat16"

  optimizer:
    name: adamw
    lr: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-8

  scheduler:
    type: cosine
    warmup_steps: 200       # smoke: warmup-Anteil ähnlich (Hauptlauf 2000/80k = 2.5%)
    min_lr_ratio: 0.1

  batch_size_per_device: 4
  gradient_accumulation: 32
  gradient_clip_norm: 1.0

  total_steps: 50

  gradient_checkpointing: true
  torch_compile: true       # bewusst an — Compile-Cost (~3-5min) ist Teil der Realismus-Messung

logging:
  log_every: 5              # häufiger als Hauptlauf (10) damit wir bei 50 steps genug Datenpunkte haben
  eval_every: 1000          # > total_steps → kein Eval im Smoke
  save_every: 1000          # > total_steps → kein full-save
  wandb:
    enabled: false          # smoke nicht in production-board

checkpointing:
  output_dir: "checkpoints/phase1_smoke"
  save_last_n: 1
  save_best: false
  external_backup:
    enabled: false

evaluation:
  max_val_batches: 0        # ohnehin kein Eval bei eval_every > total_steps
  benchmarks: []

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 3
