experiment:
  name: helix_v2_1b_code_math_anneal_v2
  version: "0.2"
  description: >
    REBALANCED anneal (Track B v2). Test v1 (code50/math30/de20) injected code
    DRAMATICALLY (code ppl 31725->293, en 238->172) but cost German (de 295->332, +12%).
    v2 protects the German-primary base: code35/math20/de45. Goal: keep most of the
    code gain (huge headroom) while holding de regression to +3-5%, en stable/better.
    Warm-start from FOUNDATION step_50000 (fresh anneal, NOT from the v1 step_2000).
    Note: de bin is only ~2.4M tokens -> ~12x repetition at 45%; eval_code_ppl decides
    whether ratio-rebalance suffices or DE retention data must be enlarged (iter 2).

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/code_anneal_v1"
  mix_ratios:
    code: 0.35
    math: 0.20
    de: 0.45
  seq_length: 2048
  val_split_bytes: 2_000_000
  dataloader_seed: 20260608

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true
  optimizer:
    name: adamw
    lr: 2.0e-5
    betas: [0.9, 0.95]
    weight_decay: 0.05
    eps: 1.0e-8
    fused: true
  scheduler:
    type: cosine
    warmup_steps: 50
    min_lr_ratio: 0.0
  batch_size_per_device: 1
  gradient_accumulation: 16
  gradient_clip_norm: 1.0
  total_steps: 2000
  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 10
  eval_every: 200
  save_every: 500
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["1b", "anneal", "code", "v2", "rebalanced"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/code_math_anneal_v2"
  save_last_n: 4
  save_best: true
  skip_step_save_if_checkpoint_written: true
  external_backup:
    enabled: false
    path: ""
    interval_steps: 1000

evaluation:
  max_val_batches: 30
  per_language_batches: 12
  tokens_per_byte:
    code: 0.28
    math: 0.22
    de: 0.18

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 8
    val_min_delta: 0.01
    bpb_regression_enabled: false
    bpb_regression_languages: []
    bpb_regression_max_increase: 0.25
    bpb_regression_k: 2
    bpb_regression_lookback: 4
    bpb_regression_warmup_evals: 3
