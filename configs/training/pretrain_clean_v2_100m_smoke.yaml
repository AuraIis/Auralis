# Clean-v2 smoke training.
#
# Uses the final clean-v2 tokenized corpus but a small 100M model and short
# sequence length. Run this before the 500M base run to verify data access,
# kernels, checkpoints, validation, and trainer health in the real container.

experiment:
  name: helix_v2_100m_pretrain_clean_v2_smoke
  version: "1.0"
  description: "Short clean-v2 smoke run before 500M base pretraining."

model:
  config_path: "configs/model/helix_v2_100m.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/pretrain_clean_v2"
  mix_ratios:
    german: 1.0
  seq_length: 64
  val_split_bytes: 5_000_000
  dataloader_seed: 20260509

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true

  optimizer:
    name: adamw
    lr: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-8
    fused: true

  scheduler:
    type: cosine
    warmup_steps: 5
    min_lr_ratio: 0.1

  batch_size_per_device: 2
  gradient_accumulation: 1
  gradient_clip_norm: 1.0
  total_steps: 20

  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 5
  eval_every: 10
  save_every: 20
  wandb:
    enabled: false

checkpointing:
  output_dir: "checkpoints/pretrain_clean_v2_100m_smoke"
  save_last_n: 2
  save_best: true
  external_backup:
    enabled: false

evaluation:
  max_val_batches: 4
  per_language_batches: 2

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 4
