# v5-Boosted continuation retry with lower VRAM pressure.
#
# Same data/checkpoint initialization as pretrain_mix_v5_boosted_500m_continue,
# but batch_size_per_device is reduced after the first attempt OOMed while a
# stale GPU context kept ~31 GB VRAM unavailable.

experiment:
  name: helix_v2_500m_pretrain_mix_v5_boosted_continue_b1_retry
  version: "0.1"
  description: "Batch-1 retry of the v5 continuation test, initialized from v4 best weights."

model:
  config_path: "configs/model/helix_v2_mid_500m_smart.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/pretrain_mix_v5_boosted"
  mix_ratios:
    german: 1.0
  seq_length: 2048
  val_split_bytes: 50_000_000
  dataloader_seed: 20260518

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true

  optimizer:
    name: adamw
    lr: 8.0e-5
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1.0e-8
    fused: true

  scheduler:
    type: cosine
    warmup_steps: 100
    min_lr_ratio: 0.2

  batch_size_per_device: 1
  gradient_accumulation: 128
  gradient_clip_norm: 1.0

  # 1 * 128 * 2048 * 3000 ~= 0.79B sampled tokens.
  total_steps: 3_000

  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 10
  eval_every: 250
  save_every: 500
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["v5-boosted", "pretrain", "continuation-test", "500m", "b1-retry"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/pretrain_mix_v5_boosted_500m_continue_b1_retry"
  save_last_n: 4
  save_best: true
  external_backup:
    enabled: true
    path: "/checkpoints/pretrain_mix_v5_boosted_500m_continue_b1_retry_backup"
    interval_steps: 1000

evaluation:
  max_val_batches: 100
  per_language_batches: 20

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 4
