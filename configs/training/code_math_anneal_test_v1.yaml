experiment:
  name: helix_v2_1b_code_math_anneal_test_v1
  version: "0.1"
  description: >
    Small TEST anneal (Track B): continued-pretrain foundation step_50000 on a code-heavy
    mix (code 50 / math 30 / de-retention 20) to inject latent code understanding. Low LR
    -> ~0 so the good base is gently shifted, not perturbed. Measure: code ppl must drop
    (baseline 31725) while de/en hold (eval_code_ppl.py). Gates code-DoRA.

model:
  config_path: "configs/model/helix_v2_1b.yaml"

data:
  data_dir: "/workspace/v2data/tokenized/code_anneal_v1"
  mix_ratios:
    code: 0.50
    math: 0.30
    de: 0.20
  seq_length: 2048
  val_split_bytes: 2_000_000
  dataloader_seed: 20260607

training:
  device: "cuda"
  dtype: "bfloat16"
  matmul_precision: "high"
  kernels:
    enabled: true
    mamba: true
    gla: true
    flash_attention: true
  optimizer:
    name: adamw
    lr: 2.0e-5
    betas: [0.9, 0.95]
    weight_decay: 0.05
    eps: 1.0e-8
    fused: true
  scheduler:
    type: cosine
    warmup_steps: 50
    min_lr_ratio: 0.0
  batch_size_per_device: 1
  gradient_accumulation: 16
  gradient_clip_norm: 1.0
  total_steps: 2000
  gradient_checkpointing: true
  torch_compile: false

logging:
  log_every: 10
  eval_every: 200
  save_every: 500
  wandb:
    enabled: false
    project: "auralis-v2"
    tags: ["1b", "anneal", "code", "test"]

checkpointing:
  output_dir: "/workspace/v2data/checkpoints/code_math_anneal_test_v1"
  save_last_n: 4
  save_best: true
  skip_step_save_if_checkpoint_written: true
  external_backup:
    enabled: false
    path: ""
    interval_steps: 1000

evaluation:
  max_val_batches: 30
  per_language_batches: 12
  tokens_per_byte:
    code: 0.28
    math: 0.22
    de: 0.18

monitoring:
  health:
    grad_explosion_threshold: 100.0
    val_regression_stop_k: 8
    val_min_delta: 0.01
    bpb_regression_enabled: false
    bpb_regression_languages: []
    bpb_regression_max_increase: 0.25
    bpb_regression_k: 2
    bpb_regression_lookback: 4
    bpb_regression_warmup_evals: 3
