# data_paths_phase2.yaml — Override für Phase-2-Daten-Downloads.
#
# Routet ALLE neuen raw-Daten auf disk7 (via SHFS-allocation: phase2_raw/*
# existiert ausschließlich auf disk7). Damit kollidieren Phase-2-Downloads
# nicht mit den disk6-Checkpoints des laufenden Phase-1-Hauptlaufs.
#
# Verwendung:
#   python scripts/data/download_code.py --config configs/data_paths_phase2.yaml --sources the_stack_v2
#   python scripts/data/download_german.py --config configs/data_paths_phase2.yaml

data_root: "/workspace/v2data"

raw:
  english: "phase2_raw/english"
  german:  "phase2_raw/german"
  code:    "phase2_raw/code"
  sft:     "raw/sft"
  orpo:    "raw/orpo"

cleaned:
  english:
    - "raw/english/fineweb_edu.txt"
    - "raw/english/wikipedia_en.txt"
    - "raw/english/openmath.txt"
  german:
    - "cleaned/german.txt"
  code:
    - "raw/code/starcoderdata.txt"
    - "raw/code/open_web_math.txt"

tokenized:
  phase1_english: "tokenized/phase1/english.bin"
  phase1_german:  "tokenized/phase1/german.bin"
  phase1_code:    "tokenized/phase1/code.bin"
  phase2_english: "tokenized/phase2/english.bin"
  phase2_german:  "tokenized/phase2/german.bin"
  phase2_code:    "tokenized/phase2/code.bin"

v1_data_root: "I:/Auralis/NEWGPT/data"

# Phase-2-Targets (die Mengen die wir zusätzlich für Phase 2 brauchen).
# Phase 2 = ~12B Tokens × Mix 30/60/10 EN/DE/Code.
phase1_targets:
  english:
    fineweb_edu:   10_000_000_000   # bereits da, nicht erneut downloaden
    wikipedia_en:   3_000_000_000
    dolma:          3_000_000_000
    openmath:       2_000_000_000
  german:
    german_commons: 3_000_000_000
    wikipedia_de:   1_000_000_000
    oscar_de:       1_000_000_000
  code:
    starcoder:      1_000_000_000
    the_stack_v2:   2_000_000_000   # erhöht von 900M auf 2B für Phase-2-Multi-Epoch-Komfort
    open_web_math:    250_000_000

filters:
  english:
    min_length: 200
    max_length: 100_000
    fineweb_min_score: 2.5
  german:
    min_length: 300
    max_length: 100_000
    max_perplexity: 500
    cultural_keep_ratio: 0.05
    excluded_subsets:
      - gutenberg_pre_1900
      - dta_historical
  code:
    min_length: 50
    max_length: 30_000
    min_stars: 5
