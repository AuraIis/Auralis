<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 910" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bg2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#0e3b25" stroke-width="1" opacity="0.5"/></pattern>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#36f58c"/></marker>
    <marker id="am" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#ff5fb0"/></marker>
    <marker id="ac" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#38d9ff"/></marker>
  </defs>

  <rect width="1320" height="910" fill="#06120b"/>
  <rect width="1320" height="910" fill="url(#grid)"/>
  <g fill="#1bd06a" opacity="0.09" font-size="15">
    <text x="60" y="150">1<tspan x="60" dy="20">0</tspan><tspan x="60" dy="20">L</tspan><tspan x="60" dy="20">o</tspan><tspan x="60" dy="20">R</tspan><tspan x="60" dy="20">A</tspan></text>
    <text x="835" y="640">0<tspan x="835" dy="20">1</tspan><tspan x="835" dy="20">D</tspan><tspan x="835" dy="20">o</tspan><tspan x="835" dy="20">R</tspan><tspan x="835" dy="20">A</tspan></text>
  </g>
  <g stroke="#2f7d52" stroke-width="1.4"><path d="M18,18 h22 M18,18 v22"/><path d="M1302,18 h-22 M1302,18 v22"/><path d="M18,888 h22 M18,888 v-22"/><path d="M1302,888 h-22 M1302,888 v-22"/></g>

  <text x="40" y="48" font-size="25" font-weight="700" fill="#36f58c" filter="url(#bg2)">AURALIS — SYSTEM VISION BLUEPRINT</text>
  <text x="42" y="72" font-size="13" fill="#38d9ff">A universal, frozen base + knowledge &amp; skills as DoRA/LoRA adapters on top — and why that needs a large vocabulary</text>
  <line x1="40" y1="82" x2="1290" y2="82" stroke="#1f7d4d" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- ===== LEFT: the layered system stack ===== -->

  <!-- Output (top) -->
  <rect x="650" y="110" width="170" height="46" rx="3" fill="#06201f" stroke="#38d9ff" stroke-width="2" filter="url(#g)"/>
  <text x="735" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#bdf3ff">Answer / Output</text>

  <!-- (4) SKILLS layer -->
  <rect x="40" y="175" width="780" height="150" rx="4" fill="#21071a" stroke="#ff5fb0" stroke-width="2.4" filter="url(#g)"/>
  <text x="58" y="200" font-size="14.5" font-weight="700" fill="#ff8ccb">④  SKILLS — DoRA / LoRA adapters (swappable)   [⚗ proxy ok · on base open]</text>
  <rect x="60" y="215" width="120" height="74" rx="3" fill="#2a0a22" stroke="#ff5fb0" stroke-width="1.8"/>
  <text x="120" text-anchor="middle" fill="#ffc6e6"><tspan x="120" y="248" font-size="13" font-weight="700">Router</tspan><tspan x="120" y="268" font-size="12">&lt;route&gt;</tspan></text>
  <g font-size="11.5" fill="#ffd0ea">
    <rect x="205" y="220" width="108" height="64" rx="3" fill="#2a0a22" stroke="#ff5fb0" stroke-width="1.5"/><text x="259" y="256" text-anchor="middle">Code</text>
    <rect x="325" y="220" width="108" height="64" rx="3" fill="#2a0a22" stroke="#ff5fb0" stroke-width="1.5"/><text x="379" y="256" text-anchor="middle">German</text>
    <rect x="445" y="220" width="108" height="64" rx="3" fill="#2a0a22" stroke="#ff5fb0" stroke-width="1.5"/><text x="499" y="256" text-anchor="middle">English</text>
    <rect x="565" y="220" width="108" height="64" rx="3" fill="#2a0a22" stroke="#ff5fb0" stroke-width="1.5"/><text x="619" y="256" text-anchor="middle">Math</text>
    <rect x="685" y="220" width="115" height="64" rx="3" fill="#2a0a22" stroke="#ff5fb0" stroke-width="1.5"/><text x="742" y="256" text-anchor="middle">Domain …</text>
  </g>
  <text x="58" y="312" font-size="11.5" fill="#ffb6df">Adapters change WEIGHTS (+ΔW), NOT the vocab — loaded/swapped per task.</text>
  <!-- router -> cartridges -->
  <g stroke="#ff5fb0" stroke-width="1.4" opacity="0.8"><line x1="180" y1="252" x2="204" y2="252" marker-end="url(#am)"/></g>

  <!-- (2) BASE -->
  <rect x="40" y="360" width="780" height="180" rx="4" fill="#08231a" stroke="#36f58c" stroke-width="2.6" filter="url(#g)"/>
  <text x="58" y="386" font-size="14.5" font-weight="700" fill="#36f58c">②  HELIX BASE — frozen ❄   (~954M · thinking body ~700M)   [✓ trained · stable]</text>
  <rect x="62" y="400" width="230" height="66" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.6"/><text x="177" text-anchor="middle" fill="#bff5cf"><tspan x="177" y="428" font-size="13" font-weight="700">6× Mamba-2</tspan><tspan x="177" y="447" font-size="10.5">State-Space O(n)</tspan></text>
  <rect x="302" y="400" width="230" height="66" rx="3" fill="#0b2640" stroke="#5aa0ff" stroke-width="1.6"/><text x="417" text-anchor="middle" fill="#bcd9ff"><tspan x="417" y="428" font-size="13" font-weight="700">16× GLA</tspan><tspan x="417" y="447" font-size="10.5">linear Attention</tspan></text>
  <rect x="542" y="400" width="256" height="66" rx="3" fill="#1d1233" stroke="#b483ff" stroke-width="1.6"/><text x="670" text-anchor="middle" fill="#dcc9ff"><tspan x="670" y="428" font-size="13" font-weight="700">6× Sparse-Attn</tspan><tspan x="670" y="447" font-size="10.5">precise Mixing</tspan></text>
  <!-- knowledge note inside base -->
  <rect x="62" y="478" width="736" height="48" rx="3" fill="#06232b" stroke="#38d9ff" stroke-width="1.6"/>
  <text x="430" text-anchor="middle" fill="#bdf3ff"><tspan x="430" y="498" font-size="12.5" font-weight="700">③  KNOWLEDGE — knowledge_dna / kernel · &lt;memory&gt; / &lt;recall&gt;   [⚗ unproven]</tspan><tspan x="430" y="516" font-size="11">dense fact blocks, called into the base (still experimental)</tspan></text>

  <!-- (1) VOCAB -->
  <rect x="40" y="575" width="780" height="78" rx="4" fill="#1a1405" stroke="#ffb454" stroke-width="2.4" filter="url(#g)"/>
  <text x="430" text-anchor="middle" fill="#ffd9a0"><tspan x="430" y="600" font-size="14.5" font-weight="700">①  REPRESENTATION — 200k UNIVERSAL vocabulary   [✓ active]</tspan><tspan x="430" y="620" font-size="11.5">en / de / code  +  &lt;route&gt; &lt;memory&gt; &lt;lora&gt; special tokens</tspan><tspan x="430" y="640" font-size="11" font-style="italic">= the substrate that covers EVERYTHING a future adapter could address</tspan></text>

  <!-- Input -->
  <rect x="40" y="685" width="170" height="46" rx="3" fill="#06201f" stroke="#38d9ff" stroke-width="2" filter="url(#g)"/>
  <text x="125" y="713" text-anchor="middle" font-size="13" font-weight="700" fill="#bdf3ff">Prompt / Input</text>

  <!-- flow arrows -->
  <line x1="125" y1="685" x2="125" y2="655" stroke="#36f58c" stroke-width="2.4" marker-end="url(#ag)"/>
  <line x1="125" y1="575" x2="125" y2="542" stroke="#36f58c" stroke-width="2.4" marker-end="url(#ag)"/>
  <line x1="735" y1="360" x2="735" y2="158" stroke="#36f58c" stroke-width="2.4" marker-end="url(#ag)"/>
  <!-- skills attach DOWN into base -->
  <g stroke="#ff5fb0" stroke-width="1.8" stroke-dasharray="6 4">
    <line x1="300" y1="325" x2="300" y2="358" marker-end="url(#am)"/>
    <line x1="500" y1="325" x2="500" y2="358" marker-end="url(#am)"/>
  </g>
  <text x="360" y="346" font-size="10.5" fill="#ff9ed1">applied to the base (+ΔW)</text>

  <!-- ===== RIGHT: WHY callouts ===== -->
  <rect x="850" y="100" width="440" height="132" rx="5" fill="#08231a" stroke="#ffb454" stroke-width="2" filter="url(#g)"/>
  <text x="866" y="124" font-size="14" font-weight="700" fill="#ffb454">WHY A LARGE VOCAB (200k)?</text>
  <text x="866" fill="#ffe6c7" font-size="12">
    <tspan x="866" y="148">A LoRA/DoRA adapter changes WEIGHTS, not the</tspan>
    <tspan x="866" y="166">token table. You can retrofit a skill —</tspan>
    <tspan x="866" y="184">but NOT a vocabulary.</tspan>
    <tspan x="866" y="206" fill="#ffd9a0">→ small vocab = permanent ceiling.</tspan>
    <tspan x="866" y="224" fill="#ffd9a0">→ 200k = universal substrate every adapter fits into.</tspan>
  </text>

  <rect x="850" y="246" width="440" height="104" rx="5" fill="#21071a" stroke="#ff5fb0" stroke-width="2" filter="url(#g)"/>
  <text x="866" y="270" font-size="14" font-weight="700" fill="#ff8ccb">ONE BASE · MANY ADAPTERS</text>
  <text x="866" fill="#ffd0ea" font-size="12">
    <tspan x="866" y="294">Knowledge &amp; skills come ON TOP — not into the base.</tspan>
    <tspan x="866" y="312">You build 1 broad, frozen base + many small,</tspan>
    <tspan x="866" y="330">swappable adapters — instead of many full models.</tspan>
  </text>

  <rect x="850" y="364" width="440" height="120" rx="5" fill="#06201f" stroke="#38d9ff" stroke-width="2" filter="url(#g)"/>
  <text x="866" y="388" font-size="14" font-weight="700" fill="#7fe0ff">HOW IT LOOKS LATER</text>
  <text x="866" fill="#c7eeff" font-size="12">
    <tspan x="866" y="412">1 frozen base (~1 GB) + a "shelf" of adapters</tspan>
    <tspan x="866" y="430">(each only a few MB). Load per task:</tspan>
    <tspan x="866" y="448">code adapter · language adapter · domain adapter.</tspan>
    <tspan x="866" y="468" fill="#8fe6ff">Fast · local · modular · one update = one adapter.</tspan>
  </text>

  <rect x="850" y="498" width="440" height="96" rx="5" fill="#1a1405" stroke="#9aa7b3" stroke-width="1.6"/>
  <text x="866" y="520" font-size="12.5" font-weight="700" fill="#cdd6df">OPEN / HONEST</text>
  <text x="866" fill="#aeb9c4" font-size="11.5">
    <tspan x="866" y="542">• Adapter knowledge (knowledge_dna) is still UNPROVEN.</tspan>
    <tspan x="866" y="560">• The universal bet pays off more with a larger base;</tspan>
    <tspan x="866" y="578">  at &lt;1B, 256M vocab params (27%) are a high price.</tspan>
  </text>

  <text x="40" y="744" font-size="11" fill="#9fb0bf">Status markers:  ✓ tested/measured   ⚗ unproven/in progress   ▷ planned   ·   measurement data + details → sheet 2 (evidence)</text>

  <!-- legend -->
  <g font-size="11">
    <rect x="40" y="755" width="13" height="13" fill="#1a1405" stroke="#ffb454" stroke-width="2"/><text x="58" y="766" fill="#9fb0bf">Representation/Vocab</text>
    <rect x="215" y="755" width="13" height="13" fill="#08231a" stroke="#36f58c" stroke-width="2"/><text x="233" y="766" fill="#9fb0bf">Base (frozen)</text>
    <rect x="380" y="755" width="13" height="13" fill="#06232b" stroke="#38d9ff" stroke-width="2"/><text x="398" y="766" fill="#9fb0bf">Knowledge</text>
    <rect x="480" y="755" width="13" height="13" fill="#21071a" stroke="#ff5fb0" stroke-width="2"/><text x="498" y="766" fill="#9fb0bf">Skills (adapters)</text>
  </g>

  <!-- ===== SCALING roadmap ===== -->
  <rect x="40" y="786" width="1250" height="104" rx="5" fill="#08231a" stroke="#36f58c" stroke-width="2.2" filter="url(#g)"/>
  <text x="58" y="810" font-size="14.5" font-weight="700" fill="#36f58c" filter="url(#g)">⑤  SCALING — the base should GROW (1B is the foundation, not the goal)   [▷ planned]</text>
  <rect x="60" y="824" width="180" height="48" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.6"/><text x="150" text-anchor="middle" fill="#bff5cf"><tspan x="150" y="845" font-size="12.5" font-weight="700">Helix v2 · ~1B</tspan><tspan x="150" y="863" font-size="10.5">vocab share ~27%</tspan></text>
  <rect x="300" y="824" width="180" height="48" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.6"/><text x="390" text-anchor="middle" fill="#bff5cf"><tspan x="390" y="845" font-size="12.5" font-weight="700">~3B</tspan><tspan x="390" y="863" font-size="10.5">vocab share ~13%</tspan></text>
  <rect x="540" y="824" width="180" height="48" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.6"/><text x="630" text-anchor="middle" fill="#bff5cf"><tspan x="630" y="845" font-size="12.5" font-weight="700">~7B+</tspan><tspan x="630" y="863" font-size="10.5">vocab share ~10%</tspan></text>
  <line x1="240" y1="848" x2="299" y2="848" stroke="#36f58c" stroke-width="2.2" marker-end="url(#ag)"/>
  <line x1="480" y1="848" x2="539" y2="848" stroke="#36f58c" stroke-width="2.2" marker-end="url(#ag)"/>
  <text x="748" fill="#cdf7da" font-size="11.5"><tspan x="748" y="838">Vocab stays fixed at 200k → the share DROPS as the base grows</tspan><tspan x="748" y="856">→ the 200k bet pays off EXACTLY when scaling.</tspan><tspan x="748" y="874">More model needs more data (→ pipeline) + more GPUs (→ DDP, already built).</tspan></text>

  <!-- title block -->
  <rect x="985" y="630" width="305" height="138" rx="3" fill="#081a12" stroke="#36f58c" stroke-width="1.8"/>
  <line x1="985" y1="658" x2="1290" y2="658" stroke="#1f7d4d" stroke-width="1"/>
  <text x="1000" y="650" font-size="12.5" font-weight="700" fill="#36f58c">AURALIS — TITLE BLOCK</text>
  <text fill="#9fe9bd" font-size="11">
    <tspan x="1000" y="678">SHEET    · SYSTEM VISION (base + adapters)</tspan>
    <tspan x="1000" y="696">LAYERS   · Vocab → Base → Knowledge → Skills</tspan>
    <tspan x="1000" y="714">BASE     · Helix v2 · 28L hybrid · 200k · bf16</tspan>
    <tspan x="1000" y="732">SKILLS   · DoRA/LoRA · &lt;route&gt;/&lt;lora&gt;</tspan>
    <tspan x="1000" y="750">STATUS   · base trained · adapters planned</tspan>
  </text>
</svg>
