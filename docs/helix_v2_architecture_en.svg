<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 545" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="545" fill="#ffffff"/>

  <!-- Title -->
  <text x="650" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2a36">Helix v2 / Auralis — Hybrid LLM (~954M, bf16)</text>
  <text x="650" y="64" text-anchor="middle" font-size="14" fill="#5b6b7a">28 layers · Pre-Norm · RoPE · SwiGLU FFN · tied 200k SentencePiece embeddings</text>

  <!-- ===== Main flow row (y 105..255) ===== -->

  <!-- Box1: Input + Embedding -->
  <rect x="30" y="105" width="170" height="150" rx="12" fill="#eef1f5" stroke="#5b6b7a" stroke-width="2"/>
  <text x="115" text-anchor="middle" fill="#2c3a47">
    <tspan x="115" y="145" font-size="15" font-weight="700">Input</tspan>
    <tspan x="115" y="167" font-size="13">Token IDs (sequence)</tspan>
    <tspan x="115" y="200" font-size="14" font-weight="700">Tied Embedding</tspan>
    <tspan x="115" y="220" font-size="13">200k → d=1280</tspan>
  </text>

  <!-- Box2: Mamba (stacked) -->
  <rect x="241" y="121" width="185" height="150" rx="12" fill="#e3f5ea" stroke="#2e9e5b" stroke-width="1.5" opacity="0.5"/>
  <rect x="233" y="113" width="185" height="150" rx="12" fill="#e3f5ea" stroke="#2e9e5b" stroke-width="1.5" opacity="0.75"/>
  <rect x="225" y="105" width="185" height="150" rx="12" fill="#e3f5ea" stroke="#2e9e5b" stroke-width="2"/>
  <text x="317" text-anchor="middle" fill="#1d6b3d">
    <tspan x="317" y="142" font-size="16" font-weight="700">6× Mamba-2</tspan>
    <tspan x="317" y="163" font-size="12.5" fill="#2c3a47">State-Space Mixer</tspan>
    <tspan x="317" y="186" font-size="12.5" fill="#2c3a47">d_state=128 · conv=4</tspan>
    <tspan x="317" y="205" font-size="12.5" fill="#2c3a47">expand=2</tspan>
    <tspan x="317" y="230" font-size="12.5" font-style="italic">linear time  O(n)</tspan>
  </text>

  <!-- Box3: GLA (stacked) -->
  <rect x="446" y="121" width="185" height="150" rx="12" fill="#e4eefb" stroke="#2f6fd0" stroke-width="1.5" opacity="0.5"/>
  <rect x="438" y="113" width="185" height="150" rx="12" fill="#e4eefb" stroke="#2f6fd0" stroke-width="1.5" opacity="0.75"/>
  <rect x="430" y="105" width="185" height="150" rx="12" fill="#e4eefb" stroke="#2f6fd0" stroke-width="2"/>
  <text x="522" text-anchor="middle" fill="#21508f">
    <tspan x="522" y="142" font-size="16" font-weight="700">16× GLA</tspan>
    <tspan x="522" y="163" font-size="12.5" fill="#2c3a47">Gated Linear</tspan>
    <tspan x="522" y="181" font-size="12.5" fill="#2c3a47">Attention</tspan>
    <tspan x="522" y="204" font-size="12.5" fill="#2c3a47">d_state=128</tspan>
    <tspan x="522" y="230" font-size="12.5" font-style="italic">linear attention surrogate</tspan>
  </text>

  <!-- Box4: Sparse Attention (stacked) -->
  <rect x="651" y="121" width="185" height="150" rx="12" fill="#efe7fa" stroke="#7a45c9" stroke-width="1.5" opacity="0.5"/>
  <rect x="643" y="113" width="185" height="150" rx="12" fill="#efe7fa" stroke="#7a45c9" stroke-width="1.5" opacity="0.75"/>
  <rect x="635" y="105" width="185" height="150" rx="12" fill="#efe7fa" stroke="#7a45c9" stroke-width="2"/>
  <text x="727" text-anchor="middle" fill="#4f2a8a">
    <tspan x="727" y="142" font-size="15.5" font-weight="700">6× Sparse-Attn</tspan>
    <tspan x="727" y="165" font-size="12.5" fill="#2c3a47">window = 1024</tspan>
    <tspan x="727" y="186" font-size="12.5" fill="#2c3a47">32 global tokens</tspan>
    <tspan x="727" y="207" font-size="12.5" fill="#2c3a47">Flash-Attention</tspan>
    <tspan x="727" y="232" font-size="12.5" font-style="italic">+ RoPE</tspan>
  </text>

  <!-- Box5: Final norm + head -->
  <rect x="840" y="105" width="185" height="150" rx="12" fill="#eef1f5" stroke="#5b6b7a" stroke-width="2"/>
  <text x="932" text-anchor="middle" fill="#2c3a47">
    <tspan x="932" y="150" font-size="14" font-weight="700">Final RMSNorm</tspan>
    <tspan x="932" y="185" font-size="14" font-weight="700">Tied LM-Head</tspan>
    <tspan x="932" y="206" font-size="13">d=1280 → 200k</tspan>
  </text>

  <!-- Box6: Logits -->
  <rect x="1045" y="105" width="160" height="150" rx="12" fill="#2c3a47" stroke="#2c3a47" stroke-width="2"/>
  <text x="1125" text-anchor="middle" fill="#ffffff">
    <tspan x="1125" y="165" font-size="16" font-weight="700">Logits</tspan>
    <tspan x="1125" y="190" font-size="13">200,000</tspan>
    <tspan x="1125" y="208" font-size="13">vocabulary</tspan>
  </text>

  <!-- flow arrows -->
  <line x1="200" y1="180" x2="223" y2="180" stroke="#5b6b7a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="180" x2="428" y2="180" stroke="#5b6b7a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="615" y1="180" x2="633" y2="180" stroke="#5b6b7a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="180" x2="838" y2="180" stroke="#5b6b7a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1025" y1="180" x2="1043" y2="180" stroke="#5b6b7a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- tied weights link -->
  <path d="M115,255 L115,288 L932,288 L932,257" fill="none" stroke="#b0387a" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <rect x="430" y="278" width="290" height="22" rx="6" fill="#fdeef5" stroke="#b0387a" stroke-width="1"/>
  <text x="575" y="293" text-anchor="middle" font-size="12.5" fill="#9c2e69">shared weights: Embedding = LM-Head (tied)</text>

  <!-- ===== Block internals (left) ===== -->
  <text x="30" y="345" font-size="15" font-weight="700" fill="#1f2a36">Block structure (Pre-Norm) — applies to each of the 28 layers</text>

  <!-- residual arcs -->
  <path d="M62,372 C 130,332 300,332 366,388" fill="none" stroke="#9aa7b3" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <path d="M388,378 C 470,338 600,338 648,388" fill="none" stroke="#9aa7b3" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="360" y="330" text-anchor="middle" font-size="11.5" fill="#7a8794">Residual (skip)</text>

  <rect x="30" y="385" width="62" height="60" rx="9" fill="#eef1f5" stroke="#5b6b7a" stroke-width="1.5"/>
  <text x="61" y="420" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3a47">x</text>

  <rect x="140" y="385" width="190" height="60" rx="9" fill="#f3f6fa" stroke="#5b6b7a" stroke-width="1.5"/>
  <text x="235" text-anchor="middle" fill="#2c3a47">
    <tspan x="235" y="410" font-size="13" font-weight="700">RMSNorm → Mixer</tspan>
    <tspan x="235" y="430" font-size="11.5">(Mamba-2 / GLA / Sparse)</tspan>
  </text>

  <circle cx="372" cy="415" r="17" fill="#fff" stroke="#5b6b7a" stroke-width="1.8"/>
  <text x="372" y="421" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3a47">+</text>

  <rect x="420" y="385" width="190" height="60" rx="9" fill="#f3f6fa" stroke="#5b6b7a" stroke-width="1.5"/>
  <text x="515" text-anchor="middle" fill="#2c3a47">
    <tspan x="515" y="410" font-size="13" font-weight="700">RMSNorm → SwiGLU</tspan>
    <tspan x="515" y="430" font-size="11.5">FFN  d_ffn=3584</tspan>
  </text>

  <circle cx="652" cy="415" r="17" fill="#fff" stroke="#5b6b7a" stroke-width="1.8"/>
  <text x="652" y="421" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3a47">+</text>

  <rect x="694" y="385" width="86" height="60" rx="9" fill="#eef1f5" stroke="#5b6b7a" stroke-width="1.5"/>
  <text x="737" y="420" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2c3a47">Output</text>

  <line x1="92" y1="415" x2="138" y2="415" stroke="#5b6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="415" x2="353" y2="415" stroke="#5b6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="389" y1="415" x2="418" y2="415" stroke="#5b6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="415" x2="633" y2="415" stroke="#5b6b7a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="669" y1="415" x2="692" y2="415" stroke="#5b6b7a" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="30" y="478" font-size="12" fill="#7a8794">The mixer changes with depth: Mamba-2 at the bottom (cheap, O(n)) · GLA in the middle · Sparse-Attention on top (precise token mixing).</text>

  <!-- ===== Specs panel (right) ===== -->
  <rect x="810" y="325" width="470" height="170" rx="10" fill="#f7f9fb" stroke="#9fb0bf" stroke-width="1.5"/>
  <text x="828" y="349" font-size="14.5" font-weight="700" fill="#1f2a36">Specifications</text>
  <text fill="#2c3a47" font-size="13">
    <tspan x="828" y="373">• ~954M parameters  (tied embeddings)</tspan>
    <tspan x="828" y="394">• d_model 1280 · 10 heads × 128</tspan>
    <tspan x="828" y="415">• FFN: SwiGLU, d_ffn 3584  (~2.8× d_model)</tspan>
    <tspan x="828" y="436">• RMSNorm (ε=1e-6) · RoPE (θ=10000, ≤8192)</tspan>
    <tspan x="828" y="457">• 200k SentencePiece vocabulary, tied</tspan>
    <tspan x="828" y="478">• bf16 · MoE off · MTP off</tspan>
  </text>
</svg>
