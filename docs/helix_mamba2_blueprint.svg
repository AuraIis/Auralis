<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 780" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#0e3b25" stroke-width="1" opacity="0.55"/>
    </pattern>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#36f58c"/></marker>
    <marker id="aa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#ffb454"/></marker>
    <marker id="am" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#ff5fb0"/></marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1320" height="780" fill="#06120b"/>
  <rect x="0" y="0" width="1320" height="780" fill="url(#grid)"/>

  <!-- faint matrix rain -->
  <g fill="#1bd06a" opacity="0.10" font-size="15">
    <text x="90"  y="120">1<tspan x="90" dy="20">0</tspan><tspan x="90" dy="20">1</tspan><tspan x="90" dy="20">1</tspan><tspan x="90" dy="20">0</tspan><tspan x="90" dy="20">A</tspan><tspan x="90" dy="20">1</tspan></text>
    <text x="420" y="500">0<tspan x="420" dy="20">1</tspan><tspan x="420" dy="20">0</tspan><tspan x="420" dy="20">B</tspan><tspan x="420" dy="20">0</tspan><tspan x="420" dy="20">1</tspan></text>
    <text x="980" y="470">1<tspan x="980" dy="20">1</tspan><tspan x="980" dy="20">0</tspan><tspan x="980" dy="20">C</tspan><tspan x="980" dy="20">1</tspan><tspan x="980" dy="20">0</tspan></text>
    <text x="1240" y="180">0<tspan x="1240" dy="20">1</tspan><tspan x="1240" dy="20">h</tspan><tspan x="1240" dy="20">1</tspan><tspan x="1240" dy="20">0</tspan></text>
    <text x="250" y="650">1<tspan x="250" dy="20">0</tspan><tspan x="250" dy="20">1</tspan><tspan x="250" dy="20">0</tspan></text>
  </g>

  <!-- corner registration marks -->
  <g stroke="#2f7d52" stroke-width="1.4">
    <path d="M18,18 h22 M18,18 v22"/><path d="M1302,18 h-22 M1302,18 v22"/>
    <path d="M18,762 h22 M18,762 v-22"/><path d="M1302,762 h-22 M1302,762 v-22"/>
  </g>

  <!-- title -->
  <text x="40" y="50" font-size="27" font-weight="700" fill="#36f58c" filter="url(#bigglow)">MAMBA-2  ·  SELEKTIVER STATE-SPACE-MIXER</text>
  <text x="42" y="74" font-size="13.5" fill="#38d9ff">HELIX v2 / AURALIS — Tiefenschnitt eines Mixer-Blocks · 6× im unteren Stapel · O(n) statt Attention-Matrix</text>
  <line x1="40" y1="84" x2="1280" y2="84" stroke="#1f7d4d" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- ===== selektive Parameter (oben) ===== -->
  <text x="565" y="110" font-size="12.5" fill="#ffb454">SELEKTIVE PARAMETER  (eingangsabhängig)</text>
  <rect x="565" y="120" width="100" height="56" rx="3" fill="#1a1405" stroke="#ffb454" stroke-width="1.8" filter="url(#glow)"/>
  <text x="615" text-anchor="middle" fill="#ffd9a0"><tspan x="615" y="142" font-size="13" font-weight="700">Δ (dt)</tspan><tspan x="615" y="160" font-size="10.5">softplus·clamp</tspan></text>
  <rect x="677" y="120" width="100" height="56" rx="3" fill="#1a1405" stroke="#ffb454" stroke-width="1.8" filter="url(#glow)"/>
  <text x="727" text-anchor="middle" fill="#ffd9a0"><tspan x="727" y="142" font-size="13" font-weight="700">A</tspan><tspan x="727" y="160" font-size="10.5">aus A_log</tspan></text>
  <rect x="789" y="120" width="110" height="56" rx="3" fill="#1a1405" stroke="#ffb454" stroke-width="1.8" filter="url(#glow)"/>
  <text x="844" text-anchor="middle" fill="#ffd9a0"><tspan x="844" y="142" font-size="13" font-weight="700">B , C</tspan><tspan x="844" y="160" font-size="10.5">selektiv</tspan></text>
  <!-- leaders into scan -->
  <line x1="615" y1="176" x2="615" y2="205" stroke="#ffb454" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aa)"/>
  <line x1="727" y1="176" x2="727" y2="205" stroke="#ffb454" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aa)"/>
  <line x1="844" y1="176" x2="844" y2="205" stroke="#ffb454" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#aa)"/>

  <!-- ===== main pipeline ===== -->
  <!-- x -->
  <rect x="30" y="258" width="72" height="80" rx="3" fill="#06201f" stroke="#38d9ff" stroke-width="2" filter="url(#glow)"/>
  <text x="66" text-anchor="middle" fill="#bdf3ff"><tspan x="66" y="293" font-size="15" font-weight="700">x</tspan><tspan x="66" y="313" font-size="10.5">L×1280</tspan></text>
  <!-- in_proj -->
  <rect x="132" y="258" width="132" height="80" rx="3" fill="#06201f" stroke="#38d9ff" stroke-width="2" filter="url(#glow)"/>
  <text x="198" text-anchor="middle" fill="#bdf3ff"><tspan x="198" y="288" font-size="13" font-weight="700">in_proj</tspan><tspan x="198" y="307" font-size="11">1280 → 2560</tspan><tspan x="198" y="324" font-size="10.5" fill="#38d9ff">expand ×2</tspan></text>
  <!-- conv -->
  <rect x="294" y="258" width="112" height="80" rx="3" fill="#072017" stroke="#36f58c" stroke-width="2" filter="url(#glow)"/>
  <text x="350" text-anchor="middle" fill="#bff5cf"><tspan x="350" y="290" font-size="12.5" font-weight="700">Conv1d</tspan><tspan x="350" y="309" font-size="11">k=4 · kausal</tspan></text>
  <!-- silu -->
  <rect x="436" y="258" width="84" height="80" rx="3" fill="#072017" stroke="#36f58c" stroke-width="2" filter="url(#glow)"/>
  <text x="478" y="303" text-anchor="middle" font-size="13" font-weight="700" fill="#bff5cf">SiLU</text>

  <!-- SCAN core -->
  <rect x="560" y="205" width="350" height="185" rx="4" fill="#08231a" stroke="#36f58c" stroke-width="2.6" filter="url(#glow)"/>
  <text x="735" y="232" text-anchor="middle" font-size="14.5" font-weight="700" fill="#36f58c" filter="url(#glow)">SELEKTIVER SCAN  (SSD)</text>
  <text x="735" text-anchor="middle" fill="#eafff2">
    <tspan x="735" y="262" font-size="14">h_t = A_t · h_t-1 + B_t · x_t</tspan>
    <tspan x="735" y="286" font-size="14">y_t = C_t · h_t + D · x_t</tspan>
  </text>
  <!-- state chain -->
  <g>
    <rect x="585" y="320" width="40" height="34" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.5"/>
    <rect x="650" y="320" width="40" height="34" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.5"/>
    <rect x="715" y="320" width="40" height="34" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.5"/>
    <rect x="780" y="320" width="40" height="34" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.5"/>
    <rect x="845" y="320" width="40" height="34" rx="3" fill="#0c3a26" stroke="#36f58c" stroke-width="1.5"/>
    <text font-size="12" fill="#bff5cf" text-anchor="middle">
      <tspan x="605" y="342">h1</tspan><tspan x="670" y="342">h2</tspan><tspan x="735" y="342">h3</tspan><tspan x="800" y="342">..</tspan><tspan x="865" y="342">hT</tspan>
    </text>
    <line x1="625" y1="337" x2="649" y2="337" stroke="#36f58c" stroke-width="1.5" marker-end="url(#ag)"/>
    <line x1="690" y1="337" x2="714" y2="337" stroke="#36f58c" stroke-width="1.5" marker-end="url(#ag)"/>
    <line x1="755" y1="337" x2="779" y2="337" stroke="#36f58c" stroke-width="1.5" marker-end="url(#ag)"/>
    <line x1="820" y1="337" x2="844" y2="337" stroke="#36f58c" stroke-width="1.5" marker-end="url(#ag)"/>
    <text x="735" y="375" text-anchor="middle" font-size="10.5" fill="#7fd6a4">Zustand h (d_state=128) wandert durch die Zeit  →</text>
  </g>

  <!-- gated norm -->
  <rect x="948" y="258" width="142" height="80" rx="3" fill="#21071a" stroke="#ff5fb0" stroke-width="2" filter="url(#glow)"/>
  <text x="1019" text-anchor="middle" fill="#ffc6e6"><tspan x="1019" y="290" font-size="12" font-weight="700">Gated RMSNorm</tspan><tspan x="1019" y="309" font-size="11.5">y ⊙ SiLU(z)</tspan></text>
  <!-- out_proj -->
  <rect x="1118" y="258" width="118" height="80" rx="3" fill="#06201f" stroke="#38d9ff" stroke-width="2" filter="url(#glow)"/>
  <text x="1177" text-anchor="middle" fill="#bdf3ff"><tspan x="1177" y="290" font-size="12.5" font-weight="700">out_proj</tspan><tspan x="1177" y="309" font-size="11">2560 → 1280</tspan></text>
  <!-- y out -->
  <rect x="1262" y="258" width="44" height="80" rx="3" fill="#06201f" stroke="#38d9ff" stroke-width="2" filter="url(#glow)"/>
  <text x="1284" y="303" text-anchor="middle" font-size="15" font-weight="700" fill="#bdf3ff">y</text>

  <!-- main arrows -->
  <g stroke="#36f58c" stroke-width="2.2">
    <line x1="102" y1="298" x2="130" y2="298" marker-end="url(#ag)"/>
    <line x1="264" y1="298" x2="292" y2="298" marker-end="url(#ag)"/>
    <line x1="406" y1="298" x2="434" y2="298" marker-end="url(#ag)"/>
    <line x1="520" y1="298" x2="558" y2="298" marker-end="url(#ag)"/>
    <line x1="910" y1="298" x2="946" y2="298" marker-end="url(#ag)"/>
    <line x1="1090" y1="298" x2="1116" y2="298" marker-end="url(#ag)"/>
    <line x1="1236" y1="298" x2="1260" y2="298" marker-end="url(#ag)"/>
  </g>

  <!-- z gate branch (magenta, around the bottom) -->
  <path d="M198,338 L198,420 L1019,420 L1019,338" fill="none" stroke="#ff5fb0" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#am)"/>
  <rect x="540" y="409" width="220" height="22" rx="5" fill="#21071a" stroke="#ff5fb0" stroke-width="1"/>
  <text x="650" y="424" text-anchor="middle" font-size="11.5" fill="#ffb6df">z (Gate-Zweig aus in_proj)</text>

  <!-- D skip -->
  <path d="M478,338 L478,455 L1010,455" fill="none" stroke="#9aa7b3" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="500" y="450" font-size="10.5" fill="#9aa7b3">D · x_t  (Skip)</text>

  <!-- ===== engineering callouts ===== -->
  <line x1="198" y1="338" x2="198" y2="356" stroke="#38d9ff" stroke-width="1"/>
  <line x1="160" y1="356" x2="236" y2="356" stroke="#38d9ff" stroke-width="1"/>
  <line x1="160" y1="352" x2="160" y2="360" stroke="#38d9ff" stroke-width="1"/>
  <line x1="236" y1="352" x2="236" y2="360" stroke="#38d9ff" stroke-width="1"/>

  <rect x="40" y="505" width="700" height="64" rx="4" fill="#08231a" stroke="#36f58c" stroke-width="1.8"/>
  <text x="56" y="530" font-size="13" font-weight="700" fill="#36f58c" filter="url(#glow)">⟶  PRINZIP</text>
  <text x="56" fill="#cdf7da" font-size="12">
    <tspan x="56" y="550">Der Zustand h ersetzt die quadratische Attention-Matrix: lineare Zeit O(n),</tspan>
    <tspan x="56" y="565">konstanter Speicher. Δ (dt) steuert, wieviel Vergangenheit behalten wird = Selektivität.</tspan>
  </text>

  <!-- legend -->
  <g font-size="11.5">
    <rect x="40" y="600" width="14" height="14" fill="#06201f" stroke="#38d9ff" stroke-width="2"/><text x="60" y="611" fill="#9fb0bf">Projektion</text>
    <rect x="170" y="600" width="14" height="14" fill="#072017" stroke="#36f58c" stroke-width="2"/><text x="190" y="611" fill="#9fb0bf">SSM-Kern</text>
    <rect x="300" y="600" width="14" height="14" fill="#1a1405" stroke="#ffb454" stroke-width="2"/><text x="320" y="611" fill="#9fb0bf">selektive Parameter</text>
    <rect x="480" y="600" width="14" height="14" fill="#21071a" stroke="#ff5fb0" stroke-width="2"/><text x="500" y="611" fill="#9fb0bf">Gate / Norm</text>
  </g>

  <!-- ===== title block (Schriftfeld) bottom-right ===== -->
  <rect x="985" y="620" width="300" height="135" rx="3" fill="#081a12" stroke="#36f58c" stroke-width="1.8"/>
  <line x1="985" y1="648" x2="1285" y2="648" stroke="#1f7d4d" stroke-width="1"/>
  <text x="1000" y="640" font-size="12.5" font-weight="700" fill="#36f58c">AURALIS / HELIX v2 — SCHRIFTFELD</text>
  <text fill="#9fe9bd" font-size="11">
    <tspan x="1000" y="667">BLATT     · MAMBA-2 SELECTIVE SSM</tspan>
    <tspan x="1000" y="685">PARAMETER · d=1280 · exp 2 · state 128 · conv 4</tspan>
    <tspan x="1000" y="703">          · dt in [1e-3, 1e-1] · bf16</tspan>
    <tspan x="1000" y="721">STÜCK     · 6× (untere Layer von 28)</tspan>
    <tspan x="1000" y="739">MASSSTAB  · n.t.s.            REV 2.0</tspan>
  </text>
</svg>
