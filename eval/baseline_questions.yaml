# Auralis v2 — Baseline-Fragen
#
# 50 feste Fragen, die bei JEDEM Checkpoint laufen.
# Niemals anpassen, um bessere Scores zu erzeugen — stattdessen neue Fragen
# anhängen und die Version hochzählen. Grundsatz: ehrliche Progress-Messung.
#
# Felder pro Frage:
#   id                Stabile Kennung (Kategorie + laufende Nummer).
#   category          geography | math | science | history | language | code | meta | ethics
#   language          de | en
#   question          Prompt an das Modell.
#   expected_keywords Liste: mindestens EINS muss case-insensitive im Output vorkommen.
#   expected          (optional) Exakte Pflicht-Substring (case-insensitive).
#   tool_required     true wenn Werkzeug-Aufruf erwartet (z.B. Rechner).
#   notes             Kommentar für Reviewer — geht nicht ins Scoring ein.

version: 1
created_at: "2026-04-22"
