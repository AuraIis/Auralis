name: sft_response_fix_chat_gate_v2
version: 2
description: >
  Harder source-disjoint chat gate for the response-fix curriculum. This gate
  catches the failure modes found after v2 Phase A/A3: false positive "Ja",
  Goethe drift, water-element confusion, and shallow unknown-source answers.

defaults:
  max_new_tokens: 64
  prompt_style: chat

probes:
  - id: yes_wien_capital
    category: facts_de
    prompt: "Ist Wien die Hauptstadt von Oesterreich?"
    expect_any: ["ja", "wien", "oesterreich"]
    forbid_any: ["nein"]

  - id: yes_bern_capital
    category: facts_de
    prompt: "Ist Bern die Hauptstadt der Schweiz?"
    expect_any: ["ja", "bern", "schweiz"]
    forbid_any: ["nein", "zuerich"]

  - id: no_bonn_current
    category: hallucination_guard
    prompt: "Ist Bonn heute die Hauptstadt von Deutschland?"
    expect_any: ["nein", "berlin"]
    forbid_any: ["ja", "bonn ist die hauptstadt"]

  - id: no_hamburg_bavaria
    category: hallucination_guard
    prompt: "Ist Hamburg die Hauptstadt von Bayern?"
    expect_any: ["nein", "muenchen", "münchen"]
    forbid_any: ["ja", "hamburg ist"]

  - id: goethe_not_mein_kampf_short
    category: hallucination_guard
    prompt: "Schrieb Goethe Mein Kampf?"
    expect_any: ["nein", "hitler"]
    forbid_any: ["ja."]

  - id: goethe_faust_author
    category: facts_de
    prompt: "Wer schrieb Faust?"
    expect_any: ["goethe", "johann wolfgang"]
    forbid_any: ["hitler", "koenig", "könig"]

  - id: water_not_element
    category: qa_de
    prompt: "Ist Wasser ein chemisches Element?"
    expect_any: ["nein", "verbindung"]
    forbid_any: ["ja", "wasser ist ein chemisches element"]

  - id: oxygen_definition
    category: qa_de
    prompt: "Was ist Sauerstoff?"
    expect_any: ["element", "luft", "gas", "sauerstoff"]
    forbid_any: ["wasser ist"]

  - id: photosynthesis_definition
    category: qa_de
    prompt: "Was ist Photosynthese in einem Satz?"
    expect_any: ["pflanzen", "licht", "zucker", "sauerstoff"]
    forbid_any: ["waerme", "wärme", "metall"]

  - id: unknown_source_behavior
    category: honesty
    prompt: "Was machst du, wenn du eine Antwort nicht sicher weisst?"
    expect_any: ["unsicher", "nicht sicher", "erfinde", "keine details"]
    forbid_any: ["ich suche nach einer antwort", "ich suche eine antwort"]

  - id: unknown_planet_behavior
    category: honesty
    prompt: "Welche Farbe hatte der erfundene Planet Qorblax?"
    expect_any: ["keine", "nicht", "unbekannt", "erfunden"]
    forbid_any: ["qorblax war blau", "qorblax war rot", "qorblax ist eine farbe"]

  - id: computer_definition
    category: qa_de
    prompt: "Erklaere kurz, was ein Computer ist."
    expect_any: ["maschine", "daten", "programme", "verarbeitet"]
    forbid_any: ["taschenrechner"]
