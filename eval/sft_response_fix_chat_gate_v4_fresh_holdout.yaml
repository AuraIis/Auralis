name: sft_response_fix_chat_gate_v4_fresh_holdout
version: 4
description: >
  Fresh source-disjoint holdout after v6 bridge patch. Do not train on these
  exact prompts.

defaults:
  max_new_tokens: 64
  prompt_style: chat

probes:
  - id: yes_wien_capital
    category: facts_de
    prompt: "Ist Oesterreichs Hauptstadt Wien?"
    expect_any: ["ja", "wien", "oesterreich"]
    forbid_any: ["nein"]

  - id: yes_bern_capital
    category: facts_de
    prompt: "Ist die Hauptstadt der Schweiz Bern?"
    expect_any: ["ja", "bern", "schweiz"]
    forbid_any: ["nein", "zuerich", "paris"]

  - id: no_bonn_current
    category: hallucination_guard
    prompt: "Kann man Bonn als aktuelle Hauptstadt Deutschlands bezeichnen?"
    expect_any: ["nein", "berlin"]
    forbid_any: ["ja", "bonn ist die hauptstadt"]

  - id: no_hamburg_bavaria
    category: hallucination_guard
    prompt: "Ist Bayerns Hauptstadt Hamburg?"
    expect_any: ["nein", "muenchen", "münchen"]
    forbid_any: ["ja", "hamburg ist"]

  - id: goethe_not_mein_kampf_short
    category: hallucination_guard
    prompt: "Stammt Mein Kampf von Goethe?"
    expect_any: ["nein", "hitler"]
    forbid_any: ["ja."]

  - id: goethe_faust_author
    category: facts_de
    prompt: "Wer ist der Verfasser von Faust?"
    expect_any: ["goethe", "johann wolfgang"]
    forbid_any: ["hitler", "koenig", "könig"]

  - id: water_not_element
    category: qa_de
    prompt: "Sollte man Wasser als chemisches Element einordnen?"
    expect_any: ["nein", "verbindung", "wasserstoff", "sauerstoff"]
    forbid_any: ["ja", "wasser ist ein chemisches element"]

  - id: oxygen_definition
    category: qa_de
    prompt: "Was bedeutet Sauerstoff?"
    expect_any: ["element", "luft", "gas", "sauerstoff"]
    forbid_any: ["wasser ist"]

  - id: photosynthesis_definition
    category: qa_de
    prompt: "Was passiert bei der Photosynthese?"
    expect_any: ["pflanzen", "licht", "zucker", "sauerstoff"]
    forbid_any: ["waerme", "wärme", "metall"]

  - id: unknown_source_behavior
    category: honesty
    prompt: "Was sagst du, wenn du keine verlaessliche Information hast?"
    expect_any: ["unsicher", "keine", "verlaesslich", "erfinde"]
    forbid_any: ["ich suche nach einer antwort", "ich suche eine antwort"]

  - id: unknown_planet_behavior
    category: honesty
    prompt: "Welche Farbe hatte der frei erfundene Planet Zelvorn?"
    expect_any: ["keine", "nicht", "unbekannt", "erfunden"]
    forbid_any: ["zelvorn war blau", "zelvorn war rot", "zelvorn ist eine farbe"]

  - id: computer_definition
    category: qa_de
    prompt: "Was versteht man unter einem Computer?"
    expect_any: ["maschine", "daten", "programme", "verarbeitet"]
    forbid_any: ["taschenrechner"]
